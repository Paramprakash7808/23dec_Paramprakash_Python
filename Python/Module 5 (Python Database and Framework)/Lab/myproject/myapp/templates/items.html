{% extends 'base.html' %}

{% block title %}Manage Items{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>My Items</h2>
            <button class="btn btn-primary" onclick="openCreateModal()">Add New Item</button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody">
                    <!-- Items will be populated here via AJAX -->
                    <tr>
                        <td colspan="4" class="text-center">Loading items...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Item Modal -->
<div class="modal fade" id="itemModal" tabindex="-1" aria-labelledby="itemModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="itemForm" onsubmit="handleFormSubmit(event)">
                <div class="modal-header">
                    <h5 class="modal-title" id="itemModalLabel">Add Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="itemId">
                    <div class="mb-3">
                        <label for="itemTitle" class="form-label">Title</label>
                        <input type="text" class="form-control" id="itemTitle" required>
                    </div>
                    <div class="mb-3">
                        <label for="itemDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="itemDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save Item</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Configuration
    const listUrl = "{% url 'list_items' %}";
    const createUrl = "{% url 'create_item' %}";
    const csrfToken = "{{ csrf_token }}";
    
    // Dynamic URLs need IDs replaced when used
    const updateUrlBase = "/ajax/items/update/";
    const deleteUrlBase = "/ajax/items/delete/";

    let itemModal;

    document.addEventListener("DOMContentLoaded", function () {
        itemModal = new bootstrap.Modal(document.getElementById('itemModal'));
        loadItems();
    });

    function getHeaders() {
        return {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
        };
    }

    // CREATE / LOAD (Read)
    function loadItems() {
        fetch(listUrl)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('itemsTableBody');
                tbody.innerHTML = '';
                
                if (data.items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">No items found. Create one above!</td></tr>';
                    return;
                }

                data.items.forEach((item, index) => {
                    const row = `
                        <tr id="row-${item.id}">
                            <td>${index + 1}</td>
                            <td>${item.title}</td>
                            <td>${item.description}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="openEditModal(${item.id}, '${item.title.replace(/'/g, "\\'")}', '${item.description.replace(/'/g, "\\'")}')">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
            })
            .catch(error => console.error('Error fetching items:', error));
    }

    // MODAL HANDLERS
    function openCreateModal() {
        document.getElementById('itemForm').reset();
        document.getElementById('itemId').value = '';
        document.getElementById('itemModalLabel').innerText = 'Add New Item';
        itemModal.show();
    }

    function openEditModal(id, title, description) {
        document.getElementById('itemId').value = id;
        document.getElementById('itemTitle').value = title;
        document.getElementById('itemDescription').value = description;
        document.getElementById('itemModalLabel').innerText = 'Edit Item';
        itemModal.show();
    }

    // FORM SUBMIT (Create & Update)
    function handleFormSubmit(event) {
        event.preventDefault();
        
        const id = document.getElementById('itemId').value;
        const title = document.getElementById('itemTitle').value;
        const description = document.getElementById('itemDescription').value;

        const isUpdating = id !== '';
        const url = isUpdating ? `${updateUrlBase}${id}/` : createUrl;
        const payload = { title, description };

        fetch(url, {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                itemModal.hide();
                loadItems(); // Refresh table
            } else {
                alert('Error: ' + data.error);
            }
        })
        .catch(error => console.error('Error submitting form:', error));
    }

    // DELETE
    function deleteItem(id) {
        if (!confirm('Are you sure you want to delete this item?')) return;

        fetch(`${deleteUrlBase}${id}/`, {
            method: 'POST',
            headers: getHeaders()
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Remove row dynamically or reload
                const row = document.getElementById(`row-${id}`);
                if (row) row.remove();
                
                // If no rows left, show empty message (simplest way is to completely reload)
                const tbody = document.getElementById('itemsTableBody');
                if (tbody.children.length === 0) {
                    loadItems();
                }
            } else {
                alert('Error deleting item: ' + data.error);
            }
        })
        .catch(error => console.error('Error deleting item:', error));
    }
</script>
{% endblock %}
