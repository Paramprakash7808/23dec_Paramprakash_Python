{% extends 'base.html' %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 4rem auto;">
    <h2 style="margin-bottom: 1.5rem;">Reset Password</h2>
    <p style="color: var(--text-dim); margin-bottom: 2rem;">Enter your email address and we'll send you instructions to reset your password.</p>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Send Reset Link</button>
    </form>
</div>
{% endblock %}
