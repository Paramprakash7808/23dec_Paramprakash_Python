{% extends 'base.html' %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 4rem auto; text-align: center;">
    <div style="font-size: 3.5rem; color: #4ade80; margin-bottom: 1.5rem;">
        <i class="fas fa-check-circle"></i>
    </div>
    <h2 style="margin-bottom: 1rem;">Password Reset Complete</h2>
    <p style="color: var(--text-dim); margin-bottom: 2rem;">
        Your password has been set. You may go ahead and log in now.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary" style="width: 100%;">Log In</a>
</div>
{% endblock %}
