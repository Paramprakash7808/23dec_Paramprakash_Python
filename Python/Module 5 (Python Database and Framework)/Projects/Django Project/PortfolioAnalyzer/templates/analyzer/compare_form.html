{% extends 'base.html' %}

{% block title %}Compare Developers - Portfolio Analyzer{% endblock %}

{% block content %}
<div style="text-align: center; margin-bottom: 4rem; margin-top: 2rem;">
    <h1 style="font-size: 3rem; font-weight: 700;">Compare Two <span style="color: var(--primary);">Developers</span></h1>
    <p style="color: var(--text-dim); font-size: 1.1rem;">Battle of the portfolios! Enter two GitHub usernames to see who stands out.</p>
</div>

<div class=" glass-card" style="max-width: 800px; margin: 0 auto; position: relative; overflow: visible;">
    <form method="POST" style="display: flex; flex-direction: column; gap: 2.5rem;">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr auto 1fr; gap: 2rem; align-items: center;">
            <div class="form-group" style="margin: 0;">
                <label>Developer One</label>
                <div style="position: relative;">
                    <i class="fab fa-github" style="position: absolute; left: 1rem; top: 1.1rem; color: var(--text-dim);"></i>
                    <input type="text" name="user1" class="form-control" placeholder="Username 1" style="padding-left: 2.8rem;" required>
                </div>
            </div>
            
            <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary); background: rgba(99, 102, 241, 0.1); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative;">
                VS
            </div>

            <div class="form-group" style="margin: 0;">
                <label>Developer Two</label>
                <div style="position: relative;">
                    <i class="fab fa-github" style="position: absolute; left: 1rem; top: 1.1rem; color: var(--text-dim);"></i>
                    <input type="text" name="user2" class="form-control" placeholder="Username 2" style="padding-left: 2.8rem;" required>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="padding: 1.2rem; font-size: 1.1rem; width: 100%; display: flex; align-items: center; justify-content: center; gap: 1rem;">
            Launch Battle <i class="fas fa-bolt"></i>
        </button>
    </form>
</div>
{% endblock %}
