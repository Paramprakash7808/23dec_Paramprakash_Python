<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex">

<!-- Left Side -->

<div class="hidden md:flex w-1/2 bg-purple-600 text-white items-center justify-center">

<div class="text-center px-10">
<h1 class="text-4xl font-bold mb-4">Join Us</h1>
<p class="text-lg opacity-90">
Create your account to get started.
</p>
</div>

</div>

<!-- Right Side -->

<div class="w-full md:w-1/2 flex items-center justify-center bg-gray-100">

<div class="bg-white p-10 rounded-xl shadow-lg w-96">

<h2 class="text-3xl font-bold text-center mb-6 text-gray-700">Create Account</h2>

<form class="space-y-4" method="post">
    {% csrf_token %}

<div>
<label class="text-sm text-gray-600">Full Name</label>
<input type="text" name="name"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none"
placeholder="Enter name">
</div>

<div>
<label class="text-sm text-gray-600">Email</label>
<input type="email" name="email"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none"
placeholder="Enter email">
</div>

<div>
<label class="text-sm text-gray-600">Mobile Number</label>
<input type="tel" name="mobile"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none"
placeholder="Enter mobile number">
</div>

<div>
<label class="text-sm text-gray-600">City</label>
<input type="text" name="city"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none"
placeholder="Enter city">
</div>

<div>
<label class="text-sm text-gray-600">Password</label>
<input type="password" name="password"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none"
placeholder="Create password">
</div>

<button type="submit" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition">
Signup
</button>

</form>

</div>

</div>

</body>
</html>
