<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - NotesApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 p-10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-white mb-2">Admin Panel</h1>
            <p class="text-slate-400">Please enter your administrative credentials</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 rounded-lg bg-red-900/50 border border-red-800 text-red-200 text-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Admin Username</label>
                <input type="text" name="username" required
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 shadow-lg transform hover:scale-[1.02]">
                Log In as Administrator
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-slate-800 text-center">
            <a href="{% url 'login' %}" class="text-slate-400 hover:text-white text-sm transition">Switch to User Login</a>
        </div>
    </div>
</body>
</html>
