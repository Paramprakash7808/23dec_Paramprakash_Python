{% extends 'base.html' %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 4rem auto;">
    <h2 style="margin-bottom: 1.5rem;">Change Password</h2>
    <p style="color: var(--text-dim); margin-bottom: 2rem;">Use the form below to change your current password.</p>
    
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: #f87171; font-size: 0.8rem; margin-top: 5px;">
                        {{ field.errors|striptags }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Update Password</button>
    </form>
</div>

<style>
    input {
        width: 100%;
        padding: 0.8rem 1rem;
        background: var(--input-bg);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        color: var(--text-main);
        outline: none;
        transition: 0.3s;
        margin-top: 0.5rem;
    }
    input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px var(--primary-glow);
    }
</style>
{% endblock %}
