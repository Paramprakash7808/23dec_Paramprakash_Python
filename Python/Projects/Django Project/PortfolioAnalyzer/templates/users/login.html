{% extends 'base.html' %}

{% block title %}Login - Portfolio Analyzer{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 4rem auto;">
    <h2 style="margin-bottom: 2rem; text-align: center; font-size: 2rem;">Welcome Back</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">Login</button>
    </form>
    <div style="margin-top: 1.5rem; text-align: center; color: var(--text-dim);">
        Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); text-decoration: none;">Register here</a>
    </div>
    <div style="margin-top: 0.5rem; text-align: center;">
        <a href="{% url 'password_reset' %}" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
    </div>
</div>
{% endblock %}
