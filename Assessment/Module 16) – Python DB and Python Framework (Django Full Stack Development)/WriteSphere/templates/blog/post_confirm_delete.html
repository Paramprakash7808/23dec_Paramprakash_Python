{% extends 'base.html' %}
{% block title %}Delete Post – WriteSphere{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-exclamation-triangle-fill text-danger fs-1 mb-3"></i>
                    <h4 class="fw-bold mb-2">Delete Post</h4>
                    <p class="text-muted mb-4">Are you sure you want to delete <strong>"{{ post.title }}"</strong>? This action cannot be undone.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Yes, Delete</button>
                            <a href="{{ post.get_absolute_url }}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
