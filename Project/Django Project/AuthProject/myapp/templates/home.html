<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

{% if user == None %}

<div class="flex items-center justify-center h-screen">

    <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-5 rounded-lg shadow-lg max-w-md">

        <div class="flex items-center">

            <svg class="w-8 h-8 mr-3 text-yellow-600" fill="none" stroke="currentColor" stroke-width="2"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 9v2m0 4h.01M10.29 3.86l-8 14A2 2 0 004 21h16a2 2 0 001.71-3.14l-8-14a2 2 0 00-3.42 0z"/>
            </svg>

            <h3 class="text-lg font-semibold">Warning</h3>
        </div>

        <p class="mt-2 text-sm">
            You are not logged in. Please login first.
        </p>

        <div class="mt-4">
            <a href="/" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-md text-sm">
                Go to Login
            </a>
        </div>

    </div>

</div>

{% else %}

<nav class="bg-white shadow p-4 flex justify-between">
    <h1 class="text-xl font-bold text-indigo-600">MyApp</h1>

    <div>
        <a href="#" class="mr-4 text-gray-600 hover:text-indigo-600">Dashboard</a>
        <a href="/userlogout" class="bg-indigo-600 text-white px-4 py-1 rounded hover:bg-red-700">Logout</a>
    </div>
</nav>

<div class="flex items-center justify-center h-[80vh]">

    <div class="bg-white p-10 shadow-lg rounded-xl text-center">

        <h2 class="text-3xl font-bold mb-3">Welcome {{ name }} 🎉</h2>
        <p class="text-gray-600">You are successfully logged in.</p>

    </div>

</div>

{% endif %}

</body>
</html>
