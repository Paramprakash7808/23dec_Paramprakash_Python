{% extends 'base.html' %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<div class="row justify-content-center animate-fade-in pt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg text-center p-4">
            <div class="bg-danger bg-opacity-10 text-danger rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
                style="width: 80px; height: 80px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor"
                    class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
                    <path
                        d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
                </svg>
            </div>

            <h2 class="h4 fw-bold text-dark mb-3">Delete Student record?</h2>
            <p class="text-secondary mb-4">You are about to permanently remove <strong>{{ object.name }}</strong> from
                the portal. This action cannot be undone.</p>

            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-danger btn-lg shadow-sm fw-bold py-3">
                        Confirm Deletion
                    </button>
                    <a href="{% url 'student-list' %}" class="btn btn-light btn-lg border fw-bold text-secondary py-3">
                        No, Keep Record
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
