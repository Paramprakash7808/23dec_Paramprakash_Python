{% extends 'NotesApp/base.html' %}
{% block title %}Reset Password - NotesApp{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-gray-100 dark:border-slate-700 p-8">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600 dark:text-green-400 text-2xl">🔒</div>
        <div>
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Reset Password</h2>
            <p class="text-sm text-gray-500 dark:text-slate-400">Enter the OTP sent to your email and choose a new password</p>
        </div>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">OTP Code</label>
            <input type="text" name="otp" required maxlength="6"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-900 dark:border-slate-700 dark:text-white text-center text-2xl tracking-widest"
                placeholder="••••••">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">New Password</label>
            <input type="password" name="password" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-900 dark:border-slate-700 dark:text-white"
                placeholder="Enter new password">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">Confirm Password</label>
            <input type="password" name="password2" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-900 dark:border-slate-700 dark:text-white"
                placeholder="Confirm new password">
        </div>
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">
            Reset Password
        </button>
    </form>
</div>
{% endblock %}
