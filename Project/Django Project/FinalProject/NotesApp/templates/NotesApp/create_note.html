{% extends 'NotesApp/base.html' %}

{% block title %}Create Note - NotesApp{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg border border-gray-100 p-8">
    <h2 class="text-3xl font-bold text-gray-800 mb-8">Create New Note</h2>
    
    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Title / Topic</label>
            {{ form.title }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            {{ form.description }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Attachment (Image or Text file)</label>
            {{ form.file }}
            <p class="text-xs text-gray-500 mt-1">Optional. Maximum file size: 5MB.</p>
        </div>
        <div class="flex items-center gap-4">
            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition duration-200 shadow-md transform hover:scale-[1.02]">
                Submit Note
            </button>
            <a href="{% url 'home' %}" class="text-gray-600 hover:text-gray-800 font-medium">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
