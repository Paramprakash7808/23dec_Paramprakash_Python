{% extends 'NotesApp/base.html' %}

{% block title %}Login - NotesApp{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-lg border border-gray-100 p-8">
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Login</h2>
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md transform hover:scale-[1.02]">
            Login
        </button>
    </form>
    <p class="mt-6 text-center text-gray-600">
        Don't have an account? <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Register here</a>
    </p>
</div>
{% endblock %}
