{% extends 'NotesApp/base.html' %}
{% block title %}Forgot Password - NotesApp{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-gray-100 dark:border-slate-700 p-8">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 rounded-full bg-yellow-100 dark:bg-yellow-900/30 flex items-center justify-center text-yellow-600 dark:text-yellow-400 text-2xl">🔑</div>
        <div>
            <h2 class="text-2xl font-bold text-gray-800 dark:text-white">Forgot Password</h2>
            <p class="text-sm text-gray-500 dark:text-slate-400">We'll send a reset OTP to your email</p>
        </div>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">Email Address</label>
            <input type="email" name="email" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-900 dark:border-slate-700 dark:text-white"
                placeholder="Enter your registered email">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">
            Send Reset OTP
        </button>
        <p class="text-center text-sm text-gray-500 dark:text-slate-400">
            Remember it? <a href="{% url 'login' %}" class="text-blue-600 dark:text-blue-400 hover:underline">Login here</a>
        </p>
    </form>
</div>
{% endblock %}
