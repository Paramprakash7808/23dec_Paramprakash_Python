{% extends 'NotesApp/base.html' %}

{% block title %}Verify OTP - NotesApp{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-gray-100 dark:border-slate-700 p-8">
    <h2 class="text-3xl font-bold text-center text-gray-800 dark:text-white mb-8">Verify Your Email</h2>
    <p class="text-center text-gray-600 dark:text-slate-400 mb-6">Please enter the 6-digit OTP sent to your email address.</p>
    
    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1">Enter OTP</label>
            <input type="text" name="otp" maxlength="6" required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-900 dark:border-slate-700 dark:text-white dark:focus:ring-blue-400 text-center text-2xl tracking-widest"
                placeholder="000000">
        </div>
        <button type="submit"
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md transform hover:scale-[1.02]">
            Verify OTP
        </button>
    </form>
    
    <div class="mt-6 text-center">
        <p class="text-gray-600 dark:text-slate-400">Didn't receive the code?</p>
        <a href="{% url 'register' %}" class="text-blue-600 dark:text-blue-400 hover:underline">Try registering again</a>
    </div>
</div>
{% endblock %}
