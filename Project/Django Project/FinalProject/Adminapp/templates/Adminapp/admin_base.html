<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard - NotesApp{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-slate-900 text-white flex flex-col">
            <div class="p-6">
                <span class="text-2xl font-bold text-blue-400">Admin Panel</span>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <a href="{% url 'admin_dashboard' %}" class="block px-4 py-3 rounded-lg hover:bg-slate-800 transition">Dashboard</a>
                <a href="{% url 'admin_user_list' %}" class="block px-4 py-3 rounded-lg hover:bg-slate-800 transition">Manage Users</a>
                <a href="{% url 'admin_note_list' %}" class="block px-4 py-3 rounded-lg hover:bg-slate-800 transition">Manage Notes</a>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <a href="{% url 'logout' %}" class="block px-4 py-2 mt-2 bg-red-600 rounded text-center font-bold">Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-y-auto">
            <header class="bg-white shadow h-16 flex items-center px-8 justify-between">
                <h2 class="text-xl font-semibold">{% block header_title %}Dashboard Overview{% endblock %}</h2>
                <div class="flex items-center gap-4">
                    <span class="text-gray-500">Logged in as: <strong>{{ user.username }}</strong></span>
                </div>
            </header>

            <main class="p-8">
                {% if messages %}
                    {% for message in messages %}
                        <div class="mb-6 p-4 rounded-lg shadow-sm 
                            {% if message.tags == 'success' %}bg-green-100 text-green-700
                            {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-700
                            {% else %}bg-red-100 text-red-700{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
