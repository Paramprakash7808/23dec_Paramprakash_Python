<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
</head>
<body>
    <h1>Paytm Payment Gateway Test</h1>
    <form action="{% url 'initiate_payment' %}" method="POST">
        {% csrf_token %}
        <label for="amount">Enter Amount (INR):</label>
        <input type="number" id="amount" name="amount" required step="0.01" min="1.00" value="10.00">
        <br><br>
        <button type="submit">Pay with Paytm</button>
    </form>
</body>
</html>
