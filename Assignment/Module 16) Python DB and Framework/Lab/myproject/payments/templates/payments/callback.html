<!DOCTYPE html>
<html>
<head>
    <title>Payment Status</title>
</head>
<body>
    <h1>Payment Status</h1>
    <h2>{{ msg }}</h2>
    <p>Status: {{ status }}</p>
    {% if resp_msg %}
    <p>Message: {{ resp_msg }}</p>
    {% endif %}
    {% if order_id %}
    <p>Order ID: {{ order_id }}</p>
    {% endif %}
    <br>
    <a href="{% url 'initiate_payment' %}">Back to Checkout</a>
</body>
</html>
