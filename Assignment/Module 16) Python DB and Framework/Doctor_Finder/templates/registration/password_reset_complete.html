{% extends 'base.html' %}
<!--
  Practical 13: Password Reset - Step 4 (Complete)
  Shown after the new password has been saved successfully.
-->

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm text-center">
      <div class="card-header bg-success text-white py-3">
        <h4 class="mb-0"><i class="fas fa-check-circle me-2"></i>Password Reset Successful</h4>
      </div>
      <div class="card-body p-4">
        <i class="fas fa-unlock-alt fa-4x text-success mb-3"></i>
        <h5 class="mb-3">Your Password Has Been Reset</h5>
        <p class="text-muted">
          Your new password has been saved. You can now log in to Doctor Finder
          using your new credentials.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg mt-2">
          <i class="fas fa-sign-in-alt me-2"></i>Login Now
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
