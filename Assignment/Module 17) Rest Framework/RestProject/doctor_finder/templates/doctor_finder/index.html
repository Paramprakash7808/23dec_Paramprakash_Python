<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Locator</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #111827;
            margin: 0;
            padding: 0;
        }

        .header {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .header p {
            margin-top: 0.5rem;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .map-section {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .map-container {
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            background-color: white;
            border: 1px solid #e5e7eb;
        }

        #map {
            width: 100%;
            height: 600px;
            background-color: #e5e7eb;
        }

        .info-window {
            padding: 10px;
        }

        .info-window h3 {
            margin: 0 0 5px 0;
            color: #1f2937;
        }

        .info-window p {
            margin: 0;
            color: #4b5563;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Find A Doctor</h1>
        <p>Locate medical professionals near you.</p>
    </div>

    <div class="map-section">
        <div class="map-container">
            <!-- Map Target -->
            <div id="map"></div>
        </div>
    </div>

    <!-- Replace 'YOUR_API_KEY' with a real Google Maps JS API Key for this to load fully interactively in production -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
    <script>
        // Load data from Django View
        const doctorData = JSON.parse('{{ doctor_data|escapejs }}');

        function initMap() {
            // Default center: coordinates roughly in the center of the US or a known location depending on your data
            let defaultLocation = { lat: 39.8283, lng: -98.5795 };
            let zoomLevel = 4;

            if(doctorData.length > 0) {
                defaultLocation = {lat: doctorData[0].lat, lng: doctorData[0].lng};
                zoomLevel = 10;
            }

            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: zoomLevel,
                center: defaultLocation,
                mapTypeControl: false,
                streetViewControl: false,
                styles: [
                    // Optional styling array to make Maps look premium/dark mode
                    // You can copy/paste snazzymaps styles here!
                ]
            });

            // Create markers
            doctorData.forEach(doc => {
                if (doc.lat && doc.lng) {
                    const marker = new google.maps.Marker({
                        position: { lat: doc.lat, lng: doc.lng },
                        map: map,
                        title: doc.name,
                        animation: google.maps.Animation.DROP
                    });

                    const infoWindow = new google.maps.InfoWindow({
                        content: `
                            <div class="info-window">
                                <h3>${doc.name}</h3>
                                <p><strong>Specialty:</strong> ${doc.specialty}</p>
                            </div>
                        `
                    });

                    marker.addListener("click", () => {
                        infoWindow.open(map, marker);
                    });
                }
            });
        }
    </script>
</body>
</html>
