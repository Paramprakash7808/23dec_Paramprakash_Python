{% extends 'base.html' %}

{% block title %}Manage Doctors{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Doctor Profiles</h2>
            <button class="btn btn-primary" onclick="openCreateModal()">Add New Doctor</button>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Specialty</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="doctorsTableBody">
                    <!-- Doctors will be populated here via AJAX -->
                    <tr>
                        <td colspan="6" class="text-center">Loading doctors...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Doctor Modal -->
<div class="modal fade" id="doctorModal" tabindex="-1" aria-labelledby="doctorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="doctorForm" onsubmit="handleFormSubmit(event)">
                <div class="modal-header">
                    <h5 class="modal-title" id="doctorModalLabel">Add Doctor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="docId">
                    <div class="mb-3">
                        <label for="docName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="docName" required>
                    </div>
                    <div class="mb-3">
                        <label for="docSpecialty" class="form-label">Specialty</label>
                        <input type="text" class="form-control" id="docSpecialty" required>
                    </div>
                    <div class="mb-3">
                        <label for="docEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="docEmail">
                    </div>
                    <div class="mb-3">
                        <label for="docPhone" class="form-label">Phone</label>
                        <input type="text" class="form-control" id="docPhone">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save Doctor</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Configuration
    const listUrl = "{% url 'list_doctors' %}";
    const createUrl = "{% url 'create_doctor' %}";
    const csrfToken = "{{ csrf_token }}";
    
    // Dynamic URLs need IDs replaced when used
    const updateUrlBase = "/ajax/doctors/update/";
    const deleteUrlBase = "/ajax/doctors/delete/";

    let doctorModal;

    document.addEventListener("DOMContentLoaded", function () {
        doctorModal = new bootstrap.Modal(document.getElementById('doctorModal'));
        loadDoctors();
    });

    function getHeaders() {
        return {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
        };
    }

    // CREATE / LOAD (Read)
    function loadDoctors() {
        fetch(listUrl)
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('doctorsTableBody');
                tbody.innerHTML = '';
                
                if (data.doctors.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No doctors found. Create one above!</td></tr>';
                    return;
                }

                data.doctors.forEach((doc, index) => {
                    // Safe injection
                    const name = doc.name.replace(/'/g, "\\'");
                    const specialty = doc.specialty.replace(/'/g, "\\'");
                    const email = doc.email.replace(/'/g, "\\'");
                    const phone = doc.phone.replace(/'/g, "\\'");

                    const row = `
                        <tr id="row-${doc.id}">
                            <td>${index + 1}</td>
                            <td>${doc.name}</td>
                            <td>${doc.specialty}</td>
                            <td>${doc.email}</td>
                            <td>${doc.phone}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="openEditModal(${doc.id}, '${name}', '${specialty}', '${email}', '${phone}')">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteDoctor(${doc.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
            })
            .catch(error => console.error('Error fetching doctors:', error));
    }

    // MODAL HANDLERS
    function openCreateModal() {
        document.getElementById('doctorForm').reset();
        document.getElementById('docId').value = '';
        document.getElementById('doctorModalLabel').innerText = 'Add New Doctor';
        doctorModal.show();
    }

    function openEditModal(id, name, specialty, email, phone) {
        document.getElementById('docId').value = id;
        document.getElementById('docName').value = name;
        document.getElementById('docSpecialty').value = specialty;
        document.getElementById('docEmail').value = email;
        document.getElementById('docPhone').value = phone;
        document.getElementById('doctorModalLabel').innerText = 'Edit Doctor';
        doctorModal.show();
    }

    // FORM SUBMIT (Create & Update)
    function handleFormSubmit(event) {
        event.preventDefault();
        
        const id = document.getElementById('docId').value;
        const name = document.getElementById('docName').value;
        const specialty = document.getElementById('docSpecialty').value;
        const email = document.getElementById('docEmail').value;
        const phone = document.getElementById('docPhone').value;

        const isUpdating = id !== '';
        const url = isUpdating ? `${updateUrlBase}${id}/` : createUrl;
        const payload = { name, specialty, email, phone };

        fetch(url, {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                doctorModal.hide();
                loadDoctors(); // Refresh table
            } else {
                alert('Error: ' + data.error);
            }
        })
        .catch(error => console.error('Error submitting form:', error));
    }

    // DELETE
    function deleteDoctor(id) {
        if (!confirm('Are you sure you want to delete this doctor profile?')) return;

        fetch(`${deleteUrlBase}${id}/`, {
            method: 'POST',
            headers: getHeaders()
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                // Remove row dynamically or reload
                const row = document.getElementById(`row-${id}`);
                if (row) row.remove();
                
                // If no rows left, show empty message
                const tbody = document.getElementById('doctorsTableBody');
                if (tbody.children.length === 0) {
                    loadDoctors();
                }
            } else {
                alert('Error deleting doctor: ' + data.error);
            }
        })
        .catch(error => console.error('Error deleting doctor:', error));
    }
</script>
{% endblock %}
